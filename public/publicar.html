<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Crear publicación | Appiu</title>
<link rel="stylesheet" href="/css/responsive.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f6fa;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-size:1.6rem;
font-weight:bold;
color:#ff2a7f;
}

nav a{
margin-left:20px;
text-decoration:none;
font-weight:bold;
color:#333;
}

nav a:hover{
color:#ff2a7f;
}

/* CONTENEDOR */

.container{

width:900px;
margin:auto;
margin-top:40px;

display:grid;
grid-template-columns:1fr 1fr;
gap:30px;

background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}

/* BOTON PARA PUBLLICAR */

.btn{
display:inline-block;
margin-top:15px;
padding:10px 20px;
border-radius:8px;
background:#ff2a7f;
color:white;
font-weight:bold;
text-decoration:none;
transition:.2s;
}

.btn:hover{
background:#e91e63;
}


/* PREVIEW */

.preview{

border:2px dashed #ddd;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:400px;

}

.preview img,
.preview video{

max-width:100%;
max-height:100%;
border-radius:10px;

}

/* FORM */

.form input,
.form textarea{

width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;

}

textarea{

height:120px;
resize:none;

}

button{

margin-top:15px;
padding:12px;
border:none;
border-radius:8px;
background:#ff2a7f;
color:white;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#e91e63;

}

.upload{

margin-top:10px;

}

</style>

</head>

<body>

<header>

<div class="logo">🌸 Appiu</div>

<nav>

<a href="menu.html">Inicio</a>
<a href="perfil.html">Perfil</a>
<a href="plantas.html">Plantas</a>

</nav>

</header>

<div class="container">

<!-- PREVIEW -->

<div class="preview" id="preview">

<p>📷 Vista previa</p>

</div>

<!-- FORMULARIO -->

<div class="form">

<h2>Crear publicación</h2>

<input id="titulo" placeholder="Título de la publicación">

<textarea id="descripcion" placeholder="Escribe algo sobre tu planta..."></textarea>

<input id="hashtags" placeholder="#plantas #naturaleza">

<input id="ubicacion" placeholder="Ubicación">

<input type="file" id="archivo" class="upload" accept="image/*,video/*">

<a href="menu.html" class="btn">Publicar</a>

</div>

</div>

<script>

/* VALIDAR LOGIN */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="login.html";
}


/* PREVISUALIZAR ARCHIVO */

const archivo = document.getElementById("archivo");
const preview = document.getElementById("preview");

archivo.addEventListener("change",()=>{

const file = archivo.files[0];

preview.innerHTML="";

if(file.type.startsWith("image")){

const img = document.createElement("img");

img.src = URL.createObjectURL(file);

preview.appendChild(img);

}

else if(file.type.startsWith("video")){

const video = document.createElement("video");

video.src = URL.createObjectURL(file);

video.controls=true;

preview.appendChild(video);

}

});


/* PUBLICAR */

async function publicar(){

const titulo = document.getElementById("titulo").value;
const descripcion = document.getElementById("descripcion").value;
const imagen = document.getElementById("imagen").value;

const user = JSON.parse(localStorage.getItem("user"));

await fetch("/api/publicaciones",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
usuario:user.username,
titulo:titulo,
descripcion:descripcion,
imagen:imagen
})

});

alert("Publicación creada");

window.location.href="inicio.html";

}
</script>

</body>
</html>
