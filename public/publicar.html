<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Crear publicación | Appiu</title>
    <link rel="stylesheet" href="css/publicar.css">
</head>
<body>

<header>
    <div class="logo" onclick="location.href='menu.html'">Appiu</div>
    <nav>
        <a href="menu.html">Inicio</a>
        <a href="perfil.html">Mi Perfil</a>
    </nav>
</header>

<div class="container">
    <div class="left">
        <div class="preview" id="preview">
            <p>Sube una foto o video de tu planta 🌿</p>
        </div>
    </div>

    <div class="right">
        <h2>Nueva Publicación</h2>
        <form id="form-publicar">
            <input type="text" id="titulo" placeholder="Título de tu brote" required>
            <textarea id="descripcion" placeholder="¿Qué nos quieres contar sobre tu planta?"></textarea>
            <input type="text" id="tags" placeholder="#plantas #naturaleza">
            <input type="text" id="ubicacion" placeholder="Ubicación (opcional)">
            
            <label for="archivo" class="label-file">Seleccionar archivo</label>
            <input type="file" id="archivo" class="upload" accept="image/*,video/*" required>

            <button type="submit" class="btn">Publicar ahora</button>
        </form>
    </div>
</div>

<script src="js/publicar.js"></script>
</body>
</html>
