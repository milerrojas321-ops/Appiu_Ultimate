<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Plantas | Appiu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/plantas.css">
</head>
<body>

<header class="appiu-header">
    <div class="header-left">
        <div class="logo-circle" onclick="location.href='menu.html'">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        <h1>Explorar</h1>
    </div>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="buscar" placeholder="Busca tu próximo brote..." onkeyup="filtrar()">
    </div>
</header>

<nav class="categories">
    <button class="pill active" onclick="filtrarCategoria('Todas')">Todas</button>
    <button class="pill" onclick="filtrarCategoria('Interior')">Interior</button>
    <button class="pill" onclick="filtrarCategoria('Suculenta')">Suculentas</button>
    <button class="pill" onclick="filtrarCategoria('Exterior')">Exterior</button>
</nav>

<div class="container">
    <div class="grid" id="grid">
        </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header-img">
            <img id="modalImg" src="">
            <span class="close-btn" onclick="cerrar()">&times;</span>
        </div>
        <div class="modal-info">
            <h2 id="modalTitulo"></h2>
            <p id="modalDescripcion"></p>
            <div class="care-grid">
                <div class="care-item"><i class="fa-solid fa-sun"></i> <div><strong>Luz</strong><p id="careLuz"></p></div></div>
                <div class="care-item"><i class="fa-solid fa-droplet"></i> <div><strong>Riego</strong><p id="careRiego"></p></div></div>
                <div class="care-item"><i class="fa-solid fa-cloud-sun"></i> <div><strong>Clima</strong><p id="careClima"></p></div></div>
                <div class="care-item"><i class="fa-solid fa-star"></i> <div><strong>Extra</strong><p id="careExtra"></p></div></div>
            </div>
            <button class="btn-adoptar" onclick="cerrar()">¡Añadir a mi Jardín!</button>
        </div>
    </div>
</div>

<script src="js/plantas.js"></script>
</body>
</html>
