<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appiu Garden | Mi Diario Verde</title>
  <link rel="stylesheet" href="./css/misplantas.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <a href="menu.html" class="btn-back"><i class="fas fa-arrow-left"></i> Menú Principal</a>

  <div class="main-content-garden">
    <header class="garden-banner">
        <div class="banner-content">
            <h1>Cultivando mi futuro</h1>
            <p>"Cada brote es una nueva historia"</p>
        </div>
    </header>

    <div class="garden-grid-layout">
        <aside class="sidebar-form">
            <div class="appiu-card form-sticky">
                <div class="card-header">
                    <h3><i class="fas fa-seedling"></i> Registrar Planta</h3>
                </div>
                <form id="plantForm">
                    <div class="upload-box" id="dropZone">
                        <input type="file" id="plantImage" accept="image/*" hidden>
                        <div class="upload-placeholder">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Sube una foto de tu jardín</span>
                        </div>
                        <img id="preview" src="" style="display:none;">
                    </div>
                    
                    <div class="input-stack">
                        <label>Nombre del brote</label>
                        <input type="text" id="plantName" placeholder="Ej. Orquídea Real" class="appiu-input" required>
                        
                        <label>Ubicación</label>
                        <select id="plantType" class="appiu-input">
                            <option value="Interior">Interior</option>
                            <option value="Exterior">Exterior</option>
                            <option value="Huerto">Huerto / Frutal</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-publish">
                        <i class="fas fa-leaf"></i> Plantar Brote
                    </button>
                </form>
            </div>
        </aside>

        <main class="plants-feed">
            <div class="feed-header">
                <h2>Mis Brotes Activos</h2>
                <div class="filter-pills">
                    <button class="pill active">Todas</button>
                    <button class="pill">Saludables</button>
                    <button class="pill">Necesitan Agua</button>
                </div>
            </div>
            
            <div id="plantsGrid" class="appiu-feed-grid"></div>
        </main>
    </div>
</div>

  <script src="./js/misplantas.js"></script>
</body>
</html>
