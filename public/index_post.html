<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Producto</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #56ab2f, #a8e063);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }
    h1 { color: #fff; margin-bottom: 20px; }
    form { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input {
      display: block;
      margin-bottom: 15px;
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      padding: 10px;
      border: none;
      background: #56ab2f;
      color: #fff;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      transition: 0.3s;
    }
    button:hover { background: #3d8b23; }
    .volver { background: #ff5e62; }
    .volver:hover { background: #e14d52; }
  </style>
</head>
<body>
  <h1>Agregar Producto</h1>
  <form id="form">
    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="number" id="precio" placeholder="Precio" required>
    <input type="number" id="cantidad" placeholder="Cantidad" required>
    <button type="submit">Agregar</button>
    <button type="button" class="volver" onclick="window.location.href='menu.html'">⬅ Volver al Menú</button>
  </form>

  <script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nombre = document.getElementById("nombre").value;
      const precio = document.getElementById("precio").value;
      const cantidad = document.getElementById("cantidad").value;

      const res = await fetch("/api/productos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, precio, cantidad })
      });
      const data = await res.json();
      alert("Producto agregado: " + data.nombre);
    });
  </script>
</body>
</html>
