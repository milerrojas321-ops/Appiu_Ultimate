<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Jardín | Appiu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-container" onclick="location.href='menu.html'">
            <i class="fa-solid fa-leaf logo-icon"></i>
            <span class="logo-text">Appiu</span>
        </div>
        <nav class="nav-icons">
            <i class="fa-solid fa-house nav-icon" onclick="location.href='menu.html'" title="Inicio"></i>
            <i class="fa-solid fa-feather-pointed nav-icon" onclick="location.href='misplantas.html'" title="Mis Plantas"></i>
            <i class="fa-solid fa-sign-out-alt nav-icon logout-icon" onclick="logout()" title="Cerrar Sesión"></i>
        </nav>
    </header>

    <main class="profile-page">
        <section class="profile-hero">
            <div class="profile-hero-content">
                <div class="avatar-wrapper">
                    <img src="" id="pfp-grande" alt="Tu foto de perfil botánico">
                    <label for="edit-foto-input" class="change-pfp-btn">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                </div>
                
                <div class="profile-details">
                    <div class="details-top">
                        <h2 id="username-display" class="profile-username">@usuario_botanico</h2>
                        <button class="btn-edit-profile" onclick="abrirModalEdicion()">
                            <i class="fa-solid fa-pen-to-square"></i> Editar mi Jardín
                        </button>
                    </div>
                    
                    <div class="profile-bio-block">
                        <h1 id="nombre-completo" class="profile-real-name">Nombre de la Planta Maestra</h1>
                        <p id="bio-text" class="profile-bio-text">Aquí va tu historia verde... Cargando biografía...</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="profile-stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="count-posts">0</span>
                <span class="stat-label">Brotes</span>
            </div>
            <div class="stat-item clickable" onclick="verSeguidores()">
                <span class="stat-value" id="count-seguidores">0</span>
                <span class="stat-label">Seguidores</span>
            </div>
            <div class="stat-item clickable" onclick="verSeguidos()">
                <span class="stat-value" id="count-seguidos">0</span>
                <span class="stat-label">Siguiendo</span>
            </div>
        </section>

        <section class="profile-content-section">
            <nav class="content-tabs">
                <div class="tab-item active">
                    <i class="fa-solid fa-grip-vertical"></i> Mis Brotes Publicados
                </div>
            </nav>

            <div class="posts-gallery" id="grid-publicaciones">
                <div class="loading-skeletons">
                    </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modal-edit">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Configuración del Jardín</h3>
                <button class="btn-close-modal" onclick="cerrarModalEdicion()">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <form id="form-edit-perfil" class="modal-form">
                <div class="form-section">
                    <h4>Identidad</h4>
                    <div class="form-input-group">
                        <label>Nombre de Usuario (Arroba)</label>
                        <input type="text" id="edit-username" name="username" placeholder="@tu_alias_verde">
                    </div>
                    </div>
                
                <div class="form-section">
                    <h4>Biografía</h4>
                    <div class="form-input-group">
                        <label>Tu historia verde</label>
                        <textarea id="edit-bio" name="expert_bio" rows="4" placeholder="Comparte tu amor..."></textarea>
                    </div>
                </div>
                
                <input type="file" id="edit-foto-input" name="foto_perfil" accept="image/*" style="display:none;">

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="cerrarModalEdicion()">Cancelar</button>
                    <button type="submit" class="btn-save-changes">Guardar Cambios Verdes</button>
                </div>
            </form>
        </div>
    </div>

    <div class="post-options-menu" id="postOptionsMenu">
        <button class="btn-delete-post" id="btnConfirmarEliminar">
            <i class="fa-solid fa-trash-can"></i> Eliminar Brote
        </button>
        <button class="btn-cancel-options" onclick="cerrarOpcionesPost()">Cancelar</button>
    </div>

    <script src="js/perfil.js"></script>
</body>
</html>
