<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Usuario | Appiu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/perfil-usuario.css">
</head>
<body>
    <div class="profile-container">
        <button onclick="history.back()" style="margin-bottom: 20px; border: none; background: none; cursor: pointer; color: var(--primary); font-weight: 800;">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </button>

        <section class="profile-header">
            <img src="" id="user-foto" alt="Foto de perfil">
            <div class="user-details">
                <h1 id="user-name">Cargando...</h1>
                <p id="user-bio">...</p>
                <button class="btn-follow-main">Seguir</button>
            </div>
        </section>

        <div class="grid-posts" id="grid-posts">
            </div>
    </div>

    <script src="js/perfil-usuario.js"></script>
</body>
</html>
