<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario | Appiu</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <style>
    /* Mantenemos tus estilos originales intactos */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("./img/login2.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 400px;
      /* Añadido para manejar formularios más largos */
      max-height: 90vh;
      overflow-y: auto;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 1.8rem;
      color: #333;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      text-align: left;
      color: #555;
      font-size: 0.9rem;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    /* Estilo específico para el input de archivo */
    input[type="file"] {
      padding: 5px;
      font-size: 0.8rem;
      background: #f9f9f9;
    }

    textarea {
      resize: none;
      height: 50px;
      font-family: inherit;
    }

    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #ff1a76;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #b70d59;
    }

    p {
      margin-top: 15px;
      font-size: 0.9rem;
    }

    a {
      color: #9b0c56;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registro de Usuario</h1>
    <form id="registroForm">
      <label for="username">Usuario:</label>
      <input type="text" id="username" placeholder="Tu nombre de usuario" required>

      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" placeholder="Tu contraseña" required>

      <label for="foto_perfil">Foto de Perfil (Obligatoria):</label>
      <input type="file" id="foto_perfil" accept="image/*" required>

      <label for="expert_bio">¿Eres experto? (Opcional):</label>
      <textarea id="expert_bio" placeholder="Cuéntanos tu experiencia botánica..."></textarea>

      <button type="submit">Registrar</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
  </div>

  <script>
    document.getElementById("registroForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      // Obtenemos los valores
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const expert_bio = document.getElementById("expert_bio").value;
      const fotoInput = document.getElementById("foto_perfil");

      // Validamos que haya una foto seleccionada
      if (fotoInput.files.length === 0) {
        alert("Por favor, selecciona una foto de perfil.");
        return;
      }

      // IMPORTANTE: Usamos FormData para poder enviar el archivo
      const formData = new FormData();
      formData.append("username", username);
      formData.append("email", email);
      formData.append("password", password);
      formData.append("expert_bio", expert_bio);
      formData.append("foto_perfil", fotoInput.files[0]); // El archivo físico

      try {
        // Enviamos a /auth/registro como ya tenías configurado
        const res = await fetch("/auth/registro", {
          method: "POST",
          // NOTA: No se envían Headers de Content-Type cuando usas FormData,
          // el navegador lo configura automáticamente incluyendo el "boundary"
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          alert("¡Registro exitoso! Ya puedes iniciar sesión 🌿");
          window.location.href = "login.html";
        } else {
          alert("Error: " + (data.message || "No se pudo registrar"));
        }
      } catch (err) {
        console.error("Error de conexión:", err);
        alert("No se pudo conectar con el servidor ❌");
      }
    });
  </script>
</body>
</html>
