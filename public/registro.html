<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario | Appiu</title>
  <link rel="stylesheet" href="css/registro.css"> </head>
<body>
  <div class="container">
    <h1>Crea tu cuenta</h1>
    <p>Únete a la comunidad botánica de Appiu 🌿</p>
    
    <form id="registroForm">
      <label for="username">Nombre de Usuario:</label>
      <input type="text" id="username" name="username" placeholder="Ej: plantlover22" required>

      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" placeholder="tu@correo.com" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required>

      <label for="expert_bio">Cuéntanos sobre ti (Bio):</label>
      <textarea id="expert_bio" name="expert_bio" placeholder="¿Qué plantas te gustan?"></textarea>

      <label for="foto_perfil" class="custom-file-upload">
          <i class="fa fa-cloud-upload"></i> Selecciona tu foto de perfil
      </label>
      <input type="file" id="foto_perfil" name="foto_perfil" accept="image/*">

      <button type="submit">Registrarse</button>
    </form>
    
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </div>

  <script src="js/registro.js"></script> </body>
</html>
